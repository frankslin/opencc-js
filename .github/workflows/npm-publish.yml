name: Node.js Package

on:
  release:
    types: [created]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20.x
        registry-url: https://registry.npmjs.org/
    - name: Install dependencies
      run: npm ci
    - name: Publish
      run: |
        NPM_TAG=$(node -p "const version = require('./package.json').version; const prerelease = version.split('-')[1]; prerelease ? prerelease.split('.')[0] : 'latest'")
        npm publish --tag "$NPM_TAG"
      env:
        NODE_AUTH_TOKEN: ${{secrets.npm_token}}
