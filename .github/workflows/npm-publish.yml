name: Node.js Package

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package_version:
        description: Version to write to package.json before publishing, for example 1.3.1-next.1 or 1.3.1-beta.0
        required: false
        type: string
      dry_run:
        description: Run npm publish with --dry-run
        required: true
        type: boolean
        default: true

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 24
        registry-url: https://registry.npmjs.org/
    - name: Prepare package version
      if: ${{ github.event_name == 'workflow_dispatch' && inputs.package_version != '' }}
      shell: bash
      env:
        PACKAGE_VERSION: ${{ inputs.package_version }}
      run: npm version "$PACKAGE_VERSION" --no-git-tag-version --allow-same-version
    - name: Install dependencies
      run: npm ci
    - name: Determine npm dist-tag
      id: npm_metadata
      shell: bash
      run: |
        version="$(node -p "require('./package.json').version")"
        tag="$(node -e "const version = process.argv[1]; const match = version.match(/-([0-9A-Za-z-]+)(?:[.+]|$)/); console.log(match ? match[1] : 'latest');" "$version")"
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "tag=$tag" >> "$GITHUB_OUTPUT"
        echo "Publishing opencc-js@$version with npm dist-tag '$tag'"
    - name: Publish
      env:
        DRY_RUN: ${{ inputs.dry_run }}
        NPM_TAG: ${{ steps.npm_metadata.outputs.tag }}
      run: |
        publish_args=(--provenance --tag "$NPM_TAG")
        if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "$DRY_RUN" = "true" ]; then
          publish_args+=(--dry-run)
        fi
        npm publish "${publish_args[@]}"
