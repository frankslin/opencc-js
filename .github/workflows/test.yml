name: Test

on:
  push:
    branches-ignore:
      - gh-pages
    paths-ignore:
      - '*.md'
  pull_request:
    branches-ignore:
      - gh-pages
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20.x
    - name: Install dependencies
      run: npm ci
    - name: Build & Test
      run: ./buildAndTest.sh
