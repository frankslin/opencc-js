name: Test

on:
  push:
    branches-ignore:
      - gh-pages
    paths-ignore:
      - '*.md'
  pull_request:
    branches-ignore:
      - gh-pages
    paths-ignore:
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Install dependencies
      run: npm ci
    - name: Build & Test
      run: npm test
